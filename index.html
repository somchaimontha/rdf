<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — มูลนิธิ ดร.โรเบิร์ต ไดเกอร์ฮอฟฟ์</title>
<link rel="stylesheet" href="assets/css/rdf.css">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{rdfBlue:'#1e3a8a'}}}}</script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* ── Login Page Specific ── */
.login-bg {
  min-height: 100vh;
  background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 40%, #1d4ed8 70%, #3b82f6 100%);
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
/* Animated background circles */
.bg-circle {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.04);
  animation: floatCircle 8s ease-in-out infinite;
}
.bg-circle:nth-child(1) { width:400px;height:400px; top:-100px; right:-100px; animation-delay:0s; }
.bg-circle:nth-child(2) { width:300px;height:300px; bottom:-80px; left:-80px; animation-delay:2s; }
.bg-circle:nth-child(3) { width:200px;height:200px; top:30%; left:10%; animation-delay:4s; }
.bg-circle:nth-child(4) { width:150px;height:150px; bottom:20%; right:15%; animation-delay:1s; }
@keyframes floatCircle {
  0%,100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.05); }
}

/* Login card */
.login-card {
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 24px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.1);
  width: 100%; max-width: 420px;
  animation: fadeInUp 0.6s ease both;
  overflow: hidden;
}
.login-header {
  background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
  padding: 32px 28px 24px;
  text-align: center;
  position: relative;
}
.login-header::after {
  content: '';
  position: absolute;
  bottom: -1px; left: 0; right: 0;
  height: 20px;
  background: rgba(255,255,255,0.95);
  border-radius: 100% 100% 0 0 / 20px 20px 0 0;
}
.logo-ring {
  width: 80px; height: 80px;
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.4);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  box-shadow: 0 0 0 6px rgba(255,255,255,0.08);
}
.login-logo { width: 56px; height: 56px; object-fit: contain; border-radius: 50%; background: white; padding: 4px; }
.login-header h1 { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.4; }
.login-header p  { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 4px; }

.login-body { padding: 28px 28px 24px; }

/* Input with icon */
.input-group { position: relative; margin-bottom: 16px; }
.input-group svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; pointer-events: none; width:18px;height:18px; }
.login-input {
  width: 100%; padding: 13px 14px 13px 44px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  font-size: 14px; font-family: inherit; color: #1e293b;
  background: #f8fafc;
  transition: all 0.2s;
  outline: none;
}
.login-input:focus {
  border-color: #1d4ed8;
  background: #fff;
  box-shadow: 0 0 0 3px rgba(29,78,216,0.1);
}
.login-input::placeholder { color: #94a3b8; font-size: 13px; }

.login-select {
  width: 100%; padding: 13px 14px 13px 44px;
  border: 1.5px solid #e2e8f0;
  border-radius: 12px;
  font-size: 14px; font-family: inherit; color: #1e293b;
  background: #f8fafc;
  transition: all 0.2s;
  outline: none; cursor: pointer;
  appearance: none;
}
.login-select:focus { border-color: #1d4ed8; background: #fff; box-shadow: 0 0 0 3px rgba(29,78,216,0.1); }

.field-label-login { display: block; font-size: 12.5px; font-weight: 700; color: #475569; margin-bottom: 6px; }

.login-btn {
  width: 100%; padding: 14px;
  background: linear-gradient(135deg, #1e3a8a 0%, #1d4ed8 100%);
  color: #fff; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 15px rgba(30,58,138,0.35);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 20px;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(30,58,138,0.45); }
.login-btn:active { transform: translateY(0); }

.login-hint {
  text-align: center; font-size: 11.5px; color: #94a3b8;
  margin-top: 14px; line-height: 1.6;
  background: #f8fafc; padding: 10px 12px; border-radius: 8px;
  border: 1px dashed #e2e8f0;
}
.login-lang {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.35);
  color: #fff; border-radius: 8px; padding: 5px 12px;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.login-lang:hover { background: rgba(255,255,255,0.3); }

/* Bottom bar */
.login-footer-bar {
  position: absolute; bottom: 18px; left: 0; right: 0;
  text-align: center;
  color: rgba(255,255,255,0.5); font-size: 11.5px;
  pointer-events: none;
}
.login-footer-bar strong { color: rgba(255,255,255,0.8); }
</style>
</head>
<body>

<!-- Loader -->
<div id="loader" class="hidden">
  <div class="loader-spinner"></div>
  <p id="loaderText">กำลังเชื่อมต่อระบบ...</p>
</div>

<!-- Login Background -->
<div class="login-bg">
  <!-- Animated circles -->
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>

  <!-- Language Toggle (absolute) -->
  <button class="login-lang" onclick="toggleLang()" id="langBtn">EN</button>

  <!-- Login Card -->
  <div class="login-card">
    <!-- Header with logo -->
    <div class="login-header">
      <div class="logo-ring">
        <img src="https://raw.githubusercontent.com/somchaimontha/rdf/refs/heads/main/RDF%20original%20s%20(2).png"
             alt="RDF Logo" class="login-logo">
      </div>
      <h1 data-t="foundation">มูลนิธิ ดร.โรเบิร์ต ไดเกอร์ฮอฟฟ์ ประเทศไทย</h1>
      <p data-t="appName">ระบบจัดการข้อมูลทุนการศึกษา</p>
    </div>

    <!-- Body -->
    <div class="login-body">
      <form onsubmit="event.preventDefault(); handleLogin();">
        <div class="mb-4">
          <label class="field-label-login" data-t="username">ชื่อผู้ใช้ / เลขบัตรประชาชน</label>
          <div class="input-group mb-0">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="loginId" class="login-input" data-t="username" data-t-attr="placeholder" required autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="field-label-login" data-t="password">รหัสผ่าน</label>
          <div class="input-group mb-0">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPass" class="login-input" data-t="password" data-t-attr="placeholder" required autocomplete="current-password">
          </div>
        </div>
        <div>
          <label class="field-label-login" data-t="loginAs">เข้าสู่ระบบในฐานะ</label>
          <div class="input-group mb-0">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87m-4-12a4 4 0 0 1 0 7.75"/></svg>
            <select id="loginRole" class="login-select">
              <option value="admin" data-t="roleAdmin">ผู้ดูแลระบบ</option>
              <option value="student" data-t="roleStudent">นักเรียนทุน</option>
            </select>
          </div>
        </div>
        <button type="submit" class="login-btn">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          <span data-t="loginBtn">เข้าสู่ระบบ</span>
        </button>
      </form>

      <div class="login-hint">
        <span data-t="loginHint">นักเรียน: เลขบัตร/รหัสนักเรียน/เบอร์โทร | รหัสผ่าน: ปีเกิด ค.ศ.</span>
        <br><span class="text-blue-500 font-semibold">Demo: admin / 1234</span>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="login-footer-bar">
    <strong data-t="foundation">มูลนิธิ ดร.โรเบิร์ต ไดเกอร์ฮอฟฟ์ ประเทศไทย</strong>
    <span class="mx-2">•</span> v<span id="appVersion"></span>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/i18n.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
document.getElementById('appVersion').textContent = RDF.VERSION;
// Redirect if already logged in
if (getUser()) window.location.href = 'dashboard.html';
</script>
</body>
</html>
